version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: shivil_postgres
    restart: always
    environment:
      POSTGRES_USER: shivil_admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: shivil_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shivil_admin -d shivil_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: shivil_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shivil_backend
    restart: always
    environment:
      PORT: 5000
      NODE_ENV: production
      DATABASE_URL: "postgresql://shivil_admin:password123@db:5432/shivil_db?schema=public"
      REDIS_URL: "redis://redis:6379"
      JWT_ACCESS_SECRET: "shivil_access_key_2026_cosmic_glow_blue"
      JWT_REFRESH_SECRET: "shivil_refresh_key_2026_cosmic_glow_purple"
      CLOUDINARY_CLOUD_NAME: "shivil-cloud"
      CLOUDINARY_API_KEY: "1234567890"
      CLOUDINARY_API_SECRET: "abcdefghijklmnopqrstuvwxyz"
      NODEMAILER_HOST: "smtp.mailtrap.io"
      NODEMAILER_PORT: 2525
      NODEMAILER_USER: "smtp-user"
      NODEMAILER_PASS: "smtp-pass"
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_logs:/app/logs

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: "/api"
    container_name: shivil_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  backend_logs:
