services:
  # 1. Express API Backend Service
  - type: web
    name: shivil-ai-backend
    env: node
    plan: starter
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/server.js
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: shivil-ai-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: "*" # Update in production settings with actual client domain
      - key: LOG_LEVEL
        value: info

  # 2. Vite React Frontend Service
  - type: web
    name: shivil-ai-frontend
    env: static
    plan: starter
    buildCommand: npm install && npm run build
    publishPath: dist
    headers:
      - path: /*
        headers:
          - key: Cache-Control
            value: public, max-age=31536000
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: shivil-ai-backend
          property: host

databases:
  # 3. Managed PostgreSQL Instance
  - name: shivil-ai-db
    plan: starter
    postgresMajorVersion: 15
